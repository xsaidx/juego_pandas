<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esquiva los Cocodrilos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #09c0e1; /* Color de fondo del juego */
            font-family: Arial, sans-serif;
        }
        
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #3dd0f5; /* Color del agua/fondo */
            overflow: hidden;
            border: 4px solid #991818; /* color del borde */
            border-radius: 10px;
        }
        
        canvas {
            display: block;
        }
    
        #menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(17, 208, 52, 0.9); /* Fondo semitransparente para el menú */
            color: rgb(29, 27, 27);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #menu-title {
            text-align: center;
            margin: 0;
            padding: 0 20px;
            font-size: 36px;
            font-weight: bold;
            color: #110f0f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
        }

        /* Estilo para el botón Jugar/Reiniciar del menú principal */
        #menu button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ae2727;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        /* Puntos, Vidas y Controles */
        #hud {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex;
            justify-content: space-between; /* Separa los puntos a la izq y botones a la der */
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            z-index: 5; /* Se muestra el puntaje arriba del canvas */
            display: none;
        }

        #controls-container {
            display: flex;
            gap: 8px; /* Espacio entre los botones superiores */
        }

        /* Estilos específicos para los botones del menú dentro del juego P, I, R*/
        #hud button {
            padding: 5px 10px;
            font-size: 14px;
            cursor: pointer;
            background-color: #ae2727;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 0;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu">
        <h1 id="menu-title">El Río Peligroso</h1>
        <button id="start-btn">Jugar</button>
    </div>
    
    <div id="hud">
        <div id="stats-container">
            <span>Puntos: <span id="score">0</span></span>
            <span style="margin-left: 10px;">Vidas: <span id="lives">3</span></span>
        </div>
        
        <div id="controls-container">
            <button id="pause-btn">Pausar</button>
            <button id="restart-btn">Reiniciar</button>
            <button id="home-btn">Inicio</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>
</div>

<script src="juego.js"></script>
</body>
</html>
