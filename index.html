<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Esquiva los Cocodrilos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #09c0e1;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Evita que la página completa haga scroll en el celular */
        }
        
        #game-container {
            position: relative;
            /* Las medidas iniciales se sobreescribirán con JS, pero sirven de base */
            width: 400px;
            height: 600px;
            background-color: #3dd0f5;
            overflow: hidden;
            border: 4px solid #991818;
            border-radius: 10px;
            touch-action: none; /* Evita gestos predeterminados del navegador al tocar */
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    
        #menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(17, 208, 52, 0.9);
            color: rgb(29, 27, 27);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #menu-title {
            text-align: center;
            margin: 0;
            padding: 0 20px;
            font-size: 32px; /* Ligeramente más pequeño para asegurar que quepa en móviles */
            font-weight: bold;
            color: #110f0f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
        }

        #menu button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #ae2727;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        #hud {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            z-index: 5;
            display: none;
        }

        #controls-container {
            display: flex;
            gap: 5px;
        }

        #hud button {
            padding: 5px 8px;
            font-size: 12px;
            cursor: pointer;
            background-color: #ae2727;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 0;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu">
        <h1 id="menu-title">El Río Peligroso</h1>
        <button id="start-btn">Jugar</button>
    </div>
    
    <div id="hud">
        <div id="stats-container">
            <span>Puntos: <span id="score">0</span></span>
            <span style="margin-left: 10px;">Vidas: <span id="lives">3</span></span>
        </div>
        
        <div id="controls-container">
            <button id="pause-btn">Pausar</button>
            <button id="restart-btn">Reiniciar</button>
            <button id="home-btn">Inicio</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>
</div>

<script src="juego.js"></script>
</body>
</html>
